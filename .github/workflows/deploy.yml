name: Deploy Gateway and Backoffice to Dev and Production

on:
  pull_request:
    types: [closed]
    branches: [ master ]

jobs:
  deploy-gateway-dev:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    environment: Development
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Gateway API for Development
      run: |
        dotnet publish AutoNext.Plotform.App.Backoffice.Gateway/AutoNext.Plotform.App.Backoffice.Gateway.csproj --configuration Release --output ./publish/gateway/dev -p:EnvironmentName=Development

    - name: Deploy Gateway to Dev via FTP with Retry
      shell: powershell
      run: |
        $maxRetries = 5
        $retryDelay = 10
        $success = $false
        
        for ($i = 1; $i -le $maxRetries; $i++) {
          try {
            Write-Host "Attempt $i of $maxRetries"
            
            $ftpServer = "${{ secrets.FTP_SERVER }}"
            $ftpUser = "${{ secrets.FTP_USERNAME }}"
            $ftpPass = "${{ secrets.FTP_PASSWORD }}"
            $localPath = ".\publish\gateway\dev\*"
            $remotePath = "${{ secrets.FTP_GATEWAY_DEV_PATH }}/"
            
            $webclient = New-Object System.Net.WebClient
            $webclient.Credentials = New-Object System.Net.NetworkCredential($ftpUser, $ftpPass)
            $webclient.BaseAddress = "ftp://$ftpServer$remotePath"
            
            # Upload each file
            Get-ChildItem -Path $localPath -File | ForEach-Object {
              $file = $_
              $remoteFile = $webclient.BaseAddress + $file.Name
              Write-Host "Uploading $($file.Name)..."
              $webclient.UploadFile($remoteFile, $file.FullName)
            }
            
            $success = $true
            Write-Host "Deployment successful!"
            break
          }
          catch {
            Write-Host "Attempt $i failed: $_"
            if ($i -lt $maxRetries) {
              Write-Host "Waiting $retryDelay seconds before retry..."
              Start-Sleep -Seconds $retryDelay
            }
          }
        }
        
        if (-not $success) {
          throw "FTP deployment failed after $maxRetries attempts"
        }

  deploy-gateway-prod:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    environment: Production
    needs: deploy-gateway-dev
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Core
