name: Deploy Gateway and Backoffice to Dev and Production

on:
  pull_request:
    types: [closed]
    branches: [ master ]

jobs:
  # ==================== GATEWAY DEV ====================
  deploy-gateway-dev:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    environment: Development
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Gateway API for Development
      run: |
        dotnet publish AutoNext.Plotform.App.Backoffice.Gateway/AutoNext.Plotform.App.Backoffice.Gateway.csproj --configuration Release --output ./publish/gateway/dev -p:EnvironmentName=Development

    - name: Deploy Gateway to Dev via FTP
      shell: powershell
      env:
        FTP_SERVER: ${{ secrets.FTP_SERVER }}
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        FTP_PATH: ${{ secrets.FTP_GATEWAY_DEV_PATH }}
      run: |
        $maxRetries = 3
        $retryDelay = 10
        $success = $false
        
        Write-Host "========================================="
        Write-Host "Deploying GATEWAY to DEVELOPMENT"
        Write-Host "========================================="
        
        for ($attempt = 1; $attempt -le $maxRetries; $attempt++) {
          try {
            Write-Host "`n📡 Attempt $attempt of $maxRetries"
            
            $ftpServer = $env:FTP_SERVER
            $ftpUser = $env:FTP_USERNAME
            $ftpPass = $env:FTP_PASSWORD
            $localPath = ".\publish\gateway\dev"
            $remotePath = $env:FTP_PATH
            
            $ftpUrl = "ftp://${ftpServer}/${remotePath}"
            Write-Host "📍 FTP Server: $ftpServer"
            Write-Host "📁 Remote Path: $remotePath"
            
            $files = Get-ChildItem -Path $localPath -File -Recurse
            Write-Host "📄 Found $($files.Count) files to upload"
            
            $webclient = New-Object System.Net.WebClient
            $webclient.Credentials = New-Object System.Net.NetworkCredential($ftpUser, $ftpPass)
            
            foreach ($file in $files) {
              $relativePath = $file.FullName.Substring($localPath.Length + 1).Replace('\', '/')
              $remoteFileUrl = "$ftpUrl/$relativePath"
              Write-Host "  ⬆ Uploading: $relativePath"
              $webclient.UploadFile($remoteFileUrl, $file.FullName)
            }
            
            $webclient.Dispose()
            $success = $true
            Write-Host "`n✅ SUCCESS: Deployed Gateway DEV"
            break
          }
          catch {
            Write-Host "❌ Attempt $attempt failed: $_"
            if ($attempt -lt $maxRetries) {
              Write-Host "⏳ Waiting $retryDelay seconds before retry..."
              Start-Sleep -Seconds $retryDelay
            }
          }
        }
        
        if (-not $success) {
          throw "FTP deployment failed after $maxRetries attempts"
        }

  # ==================== GATEWAY PROD ====================
