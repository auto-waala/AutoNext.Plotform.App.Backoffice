name: Deploy Gateway and Backoffice to Dev and Production

on:
  pull_request:
    types: [closed]
    branches: [ master ]

jobs:
  deploy-gateway-dev:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest  # Change to Ubuntu (better DNS support)
    environment: Development
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Gateway API for Development
      run: |
        dotnet publish AutoNext.Plotform.App.Backoffice.Gateway/AutoNext.Plotform.App.Backoffice.Gateway.csproj --configuration Release --output ./publish/gateway/dev -p:EnvironmentName=Development

    - name: Install lftp
      run: sudo apt-get update && sudo apt-get install -y lftp

    - name: Deploy Gateway to Dev via LFTP
      run: |
        lftp -c "
        open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}
        mirror -R --verbose --delete --parallel=4 ./publish/gateway/dev/ ${{ secrets.FTP_GATEWAY_DEV_PATH }}
        quit
        "

  deploy-gateway-prod:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: Production
    needs: deploy-gateway-dev
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Gateway API for Production
      run: |
        dotnet publish AutoNext.Plotform.App.Backoffice.Gateway/AutoNext.Plotform.App.Backoffice.Gateway.csproj --configuration Release --output ./publish/gateway/prod -p:EnvironmentName=Production

    - name: Install lftp
      run: sudo apt-get update && sudo apt-get install -y lftp

    - name: Deploy Gateway to Prod via LFTP
      run: |
        lftp -c "
        open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}
        mirror -R --verbose --delete --parallel=4 ./publish/gateway/prod/ ${{ secrets.FTP_GATEWAY_PROD_PATH }}
        quit
        "

  deploy-backoffice-dev:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: Development
    needs: deploy-gateway-dev
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Backoffice API for Development
      run: |
        dotnet publish AutoNext.Plotform.App.Backoffice/AutoNext.Plotform.App.Backoffice.csproj --configuration Release --output ./publish/backoffice/dev -p:EnvironmentName=Development

    - name: Install lftp
      run: sudo apt-get update && sudo apt-get install -y lftp

    - name: Deploy Backoffice to Dev via LFTP
      run: |
        lftp -c "
        open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}
        mirror -R --verbose --delete --parallel=4 ./publish/backoffice/dev/ ${{ secrets.FTP_BACKOFFICE_DEV_PATH }}
        quit
        "

  deploy-backoffice-prod:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: Production
    needs: [deploy-gateway-prod, deploy-backoffice-dev]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Backoffice API for Production
      run: |
        dotnet publish AutoNext.Plotform.App.Backoffice/AutoNext.Plotform.App.Backoffice.csproj --configuration Release --output ./publish/backoffice/prod -p:EnvironmentName=Production

    - name: Install lftp
      run: sudo apt-get update && sudo apt-get install -y lftp

    - name: Deploy Backoffice to Prod via LFTP
      run: |
        lftp -c "
        open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}
        mirror -R --verbose --delete --parallel=4 ./publish/backoffice/prod/ ${{ secrets.FTP_BACKOFFICE_PROD_PATH }}
        quit
        "
