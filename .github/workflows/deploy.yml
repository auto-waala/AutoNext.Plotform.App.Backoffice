name: Deploy Gateway and Backoffice to Dev and Production

on:
  pull_request:
    types: [closed]
    branches: [ master ]

jobs:
  # ==================== GATEWAY DEV ====================
  deploy-gateway-dev:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    environment: Development
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Gateway API for Development
      run: |
        dotnet publish AutoNext.Plotform.App.Backoffice.Gateway/AutoNext.Plotform.App.Backoffice.Gateway.csproj --configuration Release --output ./publish/gateway/dev -p:EnvironmentName=Development

    - name: Deploy Gateway to Dev via FTP
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/gateway/dev/
        server-dir: ${{ secrets.FTP_GATEWAY_DEV_PATH }}/
        port: 21
        timeout: 120000
        retry: 5
        retry-delay: 5000
        log: verbose
        state-name: .ftp-deploy-sync-state-gateway-dev.json

  # ==================== GATEWAY PROD ====================
  deploy-gateway-prod:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    environment: Production
    needs: deploy-gateway-dev
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Gateway API for Production
      run: |
        dotnet publish AutoNext.Plotform.App.Backoffice.Gateway/AutoNext.Plotform.App.Backoffice.Gateway.csproj --configuration Release --output ./publish/gateway/prod -p:EnvironmentName=Production

    - name: Deploy Gateway to Prod via FTP
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/gateway/prod/
        server-dir: ${{ secrets.FTP_GATEWAY_PROD_PATH }}/
        port: 21
        timeout: 120000
        retry: 5
        retry-delay: 5000
        log: verbose
        state-name: .ftp-deploy-sync-state-gateway-prod.json

  # ==================== BACKOFFICE DEV ====================
  deploy-backoffice-dev:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    environment: Development
    needs: deploy-gateway-dev
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Backoffice API for Development
      run: |
        dotnet publish AutoNext.Plotform.App.Backoffice/AutoNext.Plotform.App.Backoffice.csproj --configuration Release --output ./publish/backoffice/dev -p:EnvironmentName=Development

    - name: Deploy Backoffice to Dev via FTP
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/backoffice/dev/
        server-dir: ${{ secrets.FTP_BACKOFFICE_DEV_PATH }}/
        port: 21
        timeout: 120000
        retry: 5
        retry-delay: 5000
        log: verbose
        state-name: .ftp-deploy-sync-state-backoffice-dev.json

  # ==================== BACKOFFICE PROD ====================
  deploy-backoffice-prod:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    environment: Production
    needs: [deploy-gateway-prod, deploy-backoffice-dev]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Backoffice API for Production
      run: |
        dotnet publish AutoNext.Plotform.App.Backoffice/AutoNext.Plotform.App.Backoffice.csproj --configuration Release --output ./publish/backoffice/prod -p:EnvironmentName=Production

    - name: Deploy Backoffice to Prod via FTP
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/backoffice/prod/
        server-dir: ${{ secrets.FTP_BACKOFFICE_PROD_PATH }}/
        port: 21
        timeout: 120000
        retry: 5
        retry-delay: 5000
        log: verbose
        state-name: .ftp-deploy-sync-state-backoffice-prod.json
